    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #fff5f0 0%, #ffffff 50%, #fff0e6 100%);
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #app-loader.hide {
        opacity: 0;
        pointer-events: none;
      }
      .loader-content {
        text-align: center;
      }
      .loader-logo {
        width: 80px;
        height: 80px;
        margin-bottom: 16px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #f97316;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div class="loader-content">
        <img src="/prega_logo.png" alt="PregaSquad" class="loader-logo" onerror="this.style.display='none'" />
        <div class="loader-spinner"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        var hideLoader = function() {
          var loader = document.getElementById('app-loader');
          if (loader && !loader.classList.contains('hide')) {
            loader.classList.add('hide');
            setTimeout(function() {
              if (loader) loader.remove();
            }, 300);
          }
        };
        // Hide on load event
        window.addEventListener('load', function() {
          setTimeout(hideLoader, 100);
        });
        // Fallback: hide after 5 seconds max to prevent stuck loader
        setTimeout(hideLoader, 5000);
      })();
    </script>
  </body>
